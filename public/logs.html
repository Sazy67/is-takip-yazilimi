<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yönetimi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filters input, .filters select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .filters input {
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .action-login { color: #28a745; font-weight: 600; }
        .action-add { color: #007bff; font-weight: 600; }
        .action-edit { color: #ffc107; font-weight: 600; }
        .action-delete { color: #dc3545; font-weight: 600; }
        .action-failed { color: #dc3545; font-weight: 600; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .table-container {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 8px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Sistem Yönetimi</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('logs')">Aktivite Logları</button>
            <button class="tab" onclick="switchTab('users')">Kullanıcı Yönetimi</button>
        </div>

        <!-- Logs Tab -->
        <div id="logsTab" class="tab-content active">
            <p style="color: #666; margin-bottom: 20px;">Son 500 aktivite kaydı</p>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalLogs">0</h3>
                    <p>Toplam Log</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayLogs">0</h3>
                    <p>Bugün</p>
                </div>
                <div class="stat-card">
                    <h3 id="uniqueUsers">0</h3>
                    <p>Aktif Kullanıcı</p>
                </div>
                <div class="stat-card">
                    <h3 id="failedLogins">0</h3>
                    <p>Başarısız Giriş</p>
                </div>
            </div>

            <div class="filters">
                <input type="text" id="searchBox" placeholder="Kullanıcı adı, aksiyon veya detay ara...">
                <select id="actionFilter">
                    <option value="">Tüm Aksiyonlar</option>
                    <option value="Giriş Yaptı">Giriş Yaptı</option>
                    <option value="Başarısız Giriş">Başarısız Giriş</option>
                    <option value="Kayıt Ekledi">Kayıt Ekledi</option>
                    <option value="Kayıt Güncelledi">Kayıt Güncelledi</option>
                    <option value="Kayıt Sildi">Kayıt Sildi</option>
                    <option value="Not Ekledi">Not Ekledi</option>
                    <option value="Kullanıcı Oluşturdu">Kullanıcı Oluşturdu</option>
                    <option value="Kullanıcı Güncelledi">Kullanıcı Güncelledi</option>
                    <option value="Kullanıcı Sildi">Kullanıcı Sildi</option>
                </select>
            </div>

            <div class="table-container">
                <div id="loading" class="loading">Yükleniyor...</div>
                <table id="logsTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tarih/Saat</th>
                            <th>Kullanıcı</th>
                            <th>Aksiyon</th>
                            <th>Detaylar</th>
                            <th>IP Adresi</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <p style="color: #666;">Kullanıcı listesi ve yönetimi</p>
                <button id="newUserBtn" class="btn btn-primary">+ Yeni Kullanıcı</button>
            </div>

            <div id="userFormSection" class="form-section hidden">
                <h3 id="userFormTitle">Yeni Kullanıcı</h3>
                <form id="userForm" onsubmit="handleUserSubmit(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Kullanıcı Adı</label>
                            <input type="text" id="userUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Şifre</label>
                            <input type="password" id="userPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Yetki</label>
                            <select id="userRole" required>
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top: 15px;">
                        <button type="submit" class="btn btn-success">Kaydet</button>
                        <button type="button" class="btn btn-secondary" onclick="hideUserForm()">İptal</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Kullanıcı Adı</th>
                            <th>Yetki</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="4" class="loading">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allLogs = [];
        let editingUserId = null;

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'logs') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('logsTab').classList.add('active');
                fetchLogs();
            } else if (tab === 'users') {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('usersTab').classList.add('active');
                fetchUsers();
            }
        }

        // Logs functions
        async function fetchLogs() {
            try {
                const response = await fetch('/api/secret-logs-x9k2p7m4?key=suat2025');
                if (!response.ok) {
                    document.getElementById('loading').textContent = 'Erişim reddedildi!';
                    return;
                }
                allLogs = await response.json();
                calculateStats();
                renderLogs(allLogs);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('logsTable').style.display = 'table';
            } catch (error) {
                document.getElementById('loading').textContent = 'Yükleme hatası!';
            }
        }

        function calculateStats() {
            document.getElementById('totalLogs').textContent = allLogs.length;
            
            const today = new Date().toISOString().split('T')[0];
            const todayLogs = allLogs.filter(log => log.created_at.startsWith(today));
            document.getElementById('todayLogs').textContent = todayLogs.length;
            
            const uniqueUsers = new Set(allLogs.map(log => log.username)).size;
            document.getElementById('uniqueUsers').textContent = uniqueUsers;
            
            const failedLogins = allLogs.filter(log => log.action.includes('Başarısız')).length;
            document.getElementById('failedLogins').textContent = failedLogins;
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('logsTableBody');
            tbody.innerHTML = logs.map(log => {
                const date = new Date(log.created_at);
                const formattedDate = date.toLocaleString('tr-TR');
                
                let actionClass = '';
                if (log.action === 'Giriş Yaptı') actionClass = 'action-login';
                else if (log.action.includes('Ekledi') || log.action.includes('Oluşturdu')) actionClass = 'action-add';
                else if (log.action.includes('Güncelledi')) actionClass = 'action-edit';
                else if (log.action.includes('Sildi')) actionClass = 'action-delete';
                else if (log.action.includes('Başarısız')) actionClass = 'action-failed';
                
                return `
                    <tr>
                        <td>${log.id}</td>
                        <td>${formattedDate}</td>
                        <td><strong>${log.username}</strong></td>
                        <td class="${actionClass}">${log.action}</td>
                        <td>${log.details || '-'}</td>
                        <td>${log.ip_address || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('searchBox').addEventListener('input', filterLogs);
        document.getElementById('actionFilter').addEventListener('change', filterLogs);

        function filterLogs() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const actionFilter = document.getElementById('actionFilter').value;
            
            const filtered = allLogs.filter(log => {
                const matchesSearch = !search || 
                    log.username.toLowerCase().includes(search) ||
                    log.action.toLowerCase().includes(search) ||
                    (log.details && log.details.toLowerCase().includes(search));
                
                const matchesAction = !actionFilter || log.action.includes(actionFilter);
                
                return matchesSearch && matchesAction;
            });
            
            renderLogs(filtered);
        }

        // Users functions
        async function fetchUsers() {
            try {
                const response = await fetch('/api/users', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const users = await response.json();
                renderUsers(users);
            } catch (error) {
                console.error('Kullanıcılar yüklenirken hata:', error);
                document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: #dc3545;">Yükleme hatası! Giriş yapmanız gerekebilir.</td></tr>';
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.role === 'admin' ? 'Admin' : 'User'}</td>
                    <td>
                        <button onclick="editUser(${user.id})" class="btn btn-success">Düzenle</button>
                        <button onclick="deleteUser(${user.id})" class="btn btn-danger">Sil</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('newUserBtn').addEventListener('click', () => {
            editingUserId = null;
            document.getElementById('userFormTitle').textContent = 'Yeni Kullanıcı';
            document.getElementById('userUsername').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = 'user';
            document.getElementById('userFormSection').classList.remove('hidden');
        });

        function editUser(id) {
            fetch('/api/users', {
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                }
            })
            .then(res => res.json())
            .then(users => {
                const user = users.find(u => u.id === id);
                if (user) {
                    editingUserId = id;
                    document.getElementById('userFormTitle').textContent = 'Kullanıcı Düzenle';
                    document.getElementById('userUsername').value = user.username;
                    document.getElementById('userPassword').value = '';
                    document.getElementById('userRole').value = user.role;
                    document.getElementById('userFormSection').classList.remove('hidden');
                }
            });
        }

        async function handleUserSubmit(e) {
            e.preventDefault();
            
            const userData = {
                username: document.getElementById('userUsername').value,
                password: document.getElementById('userPassword').value,
                role: document.getElementById('userRole').value
            };
            
            try {
                const url = editingUserId ? `/api/users/${editingUserId}` : '/api/users';
                const method = editingUserId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(userData)
                });
                
                if (response.ok) {
                    hideUserForm();
                    fetchUsers();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Hata oluştu');
                }
            } catch (error) {
                alert('Kullanıcı kaydedilirken hata oluştu');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Bu kullanıcıyı silmek istediğinizden emin misiniz?')) return;
            if (!confirm('Kullanıcı kalıcı olarak silinecek! Onaylıyor musunuz?')) return;
            
            try {
                const response = await fetch(`/api/users/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                if (response.ok) {
                    fetchUsers();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Silme hatası');
                }
            } catch (error) {
                alert('Kullanıcı silinirken hata oluştu');
            }
        }

        function hideUserForm() {
            document.getElementById('userFormSection').classList.add('hidden');
            editingUserId = null;
        }

        // Initialize
        fetchLogs();
        setInterval(fetchLogs, 30000); // Auto-refresh logs every 30 seconds
    </script>
</body>
</html>
